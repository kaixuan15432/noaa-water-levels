<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOAA Water Levels - Map View</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        body { margin: 0; font-family: Arial, sans-serif; height: 100vh; display: block; position: relative; }
        #map { width: 100%; height: 100%; }
        #sidebar { position: absolute; bottom: 0; right: 0; width: 70%; height: 50%; padding: 20px; background: #f5f5f5; overflow-y: auto; display: none; box-sizing: border-box; z-index: 1000; }
        #sidebar.active { display: block; }
        h2 { margin: 0 0 10px 0; color: #333; }
        #chart-container { width: 100%; height: calc(100% - 40px); }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <h2 id="stationTitle">Station</h2>
        <div id="chart-container"><canvas id="compareChart"></canvas></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
var stations = [];
var modelData = {};
var stationObservedData = {};
var map;
var modelTimeRange = {};

async function initMap() {
    map = L.map('map').setView([27.0, -82.0], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'OpenStreetMap'
    }).addTo(map);
    
    await loadAllStations();
}

async function loadAllStations() {
    try {
        var floridaStations = await loadBPFile('Florida_1mv1.bp');
        var irmaStations = await loadBPFile('Irma_elev.bp');
        stations = floridaStations.concat(irmaStations);
        console.log('Total stations:', stations.length);
        updateMarkers();
    } catch (e) {
        console.error('Error loading stations:', e);
    }
}

function loadBPFile(bpFile) {
    return new Promise(function(resolve, reject) {
        fetch('data/' + bpFile).then(function(response) {
            return response.text();
        }).then(function(text) {
            var lines = text.trim().split('\n');
            var result = [];
            var isIrma = bpFile === 'Irma_elev.bp';
            
            if (isIrma) {
                for (var i = 2; i < lines.length; i++) {
                    try {
                        var rawLine = lines[i];
                        if (!rawLine) continue;
                        var lineStr = '';
                        if (typeof rawLine === 'string') {
                            lineStr = rawLine.trim();
                        } else if (typeof rawLine === 'number') {
                            lineStr = String(rawLine).trim();
                        } else {
                            lineStr = String(rawLine).trim();
                        }
                        if (!lineStr || lineStr.length === 0) continue;
                        var hashPos = lineStr.indexOf('#');
                        if (hashPos < 0) continue;
                        var leftSide = lineStr.substring(0, hashPos).trim();
                        var rightSide = lineStr.substring(hashPos + 1).trim();
                        var leftParts = leftSide.split(/\s+/);
                        var rightParts = rightSide.split(/\s+/);
                        if (leftParts.length >= 3 && rightParts.length >= 1) {
                            result.push({
                                id: rightParts[0],
                                apiId: rightParts[1] || '',
                                lat: leftParts[2],
                                lng: leftParts[1],
                                name: rightParts[0],
                                isIrma: true
                            });
                        }
                    } catch (e) { console.log('Skip line', i, e); }
                }
            } else {
                for (var i = 2; i < lines.length; i++) {
                    var parts = lines[i].trim().split(/\s+/);
                    if (parts.length >= 5) {
                        result.push({ id: parts[4], lat: parts[2], lng: parts[1], name: parts[4], apiId: '', isIrma: false });
                    }
                }
            }
            resolve(result);
        }).catch(reject);
    });
}

function updateMarkers() {
    console.log('Updating markers for', stations.length, 'stations');
    stations.forEach(function(station) {
        console.log('Adding marker:', station.name, station.lat, station.lng);
        var marker = L.marker([parseFloat(station.lat), parseFloat(station.lng)]).addTo(map);
        marker.bindPopup(station.name);
        marker.on('click', function() { openSidebar(station); });
    });
}

function getStationName(id) {
    var names = {
        '8725520': 'Fort Myers, FL',
        '8725110': 'Naples, FL',
        '8724580': 'Key West, FL',
        '8723970': 'Vaca Key, Florida Bay, FL',
        '8723214': 'Virginia Key, FL',
        '8722956': 'South Port Everglades, FL',
        '8722670': 'Virginia Key, FL',
        '8726724': 'Clearwater Beach, FL',
        '8726520': 'St. Petersburg, FL',
        '8726384': 'Old Port Tampa, FL',
        '8726667': 'Apalachicola, FL',
        '8726607': 'Panama City, FL'
    };
    return names[id] || id;
}

async function openSidebar(station) {
    document.getElementById('sidebar').classList.add('active');
    await loadModelData();
    if (station.isIrma && station.apiId) {
        await loadIrmaStationData(station.apiId);
    } else {
        await loadStationData(station.id);
    }
    renderCompareChart(station);
}

async function loadModelData() {
    var response = await fetch('data/model_predictions.txt');
    var text = await response.text();
    var lines = text.trim().split('\n');
    var now = new Date();
    var modelStart = new Date(now.getTime() - 7 * 86400000);
    modelStart.setUTCHours(1, 0, 0, 0);
    modelData = {};
    stations.forEach(function(s) { modelData[s.id] = []; });
    var firstTime = null, lastTime = null;
    
    lines.forEach(function(line, index) {
        var timestamp = new Date(modelStart.getTime() + index * 3600000);
        var parts = line.trim().split(/\s+/);
        if (!firstTime) firstTime = timestamp;
        lastTime = timestamp;
        
        for (var i = 0; i < stations.length; i++) {
            var station = stations[i];
            var colIndex;
            if (station.isIrma) {
                colIndex = 13 + (i - 12);
            } else {
                colIndex = 1 + i;
            }
            var value = parseFloat(parts[colIndex]);
            if (!isNaN(value)) {
                modelData[station.id].push({ time: timestamp, value: value });
            }
        }
    });
    modelTimeRange = { start: firstTime, end: lastTime };
}

async function loadIrmaStationData(apiId) {
    if (!modelTimeRange.start || !modelTimeRange.end || !apiId) return;
    
    var now = new Date();
    var startDate = new Date(now);
    startDate.setDate(startDate.getDate() - 7);
    var startStr = startDate.toISOString().slice(0, 10).replace(/-/g, '');
    var endStr = now.toISOString().slice(0, 10).replace(/-/g, '');
    
    var url = 'https://insightsdata.api.sfwmd.gov/v1/insights-data/cont/data?timeseriesIds=' + apiId + '&reportType=timeseries&format=plot&period=1week';
    
    try {
        var response = await fetch(url);
        if (!response.ok) return;
        var data = await response.json();
        
        if (!data.timeseries || !data.timeseries[0] || !data.timeseries[0].values) return;
        
        var rawData = [];
        data.timeseries[0].values.forEach(function(item) {
            if (item.x && item.y !== null) {
                var dt = new Date(item.x);
                var val = parseFloat(item.y) * 0.3048;
                rawData.push({ time: dt, value: val });
            }
        });
        
        rawData.sort(function(a, b) { return a.time - b.time; });
        
        var hourlyData = {};
        rawData.forEach(function(d) {
            var hourKey = new Date(d.time);
            hourKey.setMinutes(0, 0, 0);
            if (!hourlyData[hourKey.getTime()]) {
                hourlyData[hourKey.getTime()] = [];
            }
            hourlyData[hourKey.getTime()].push(d.value);
        });
        
        var result = [];
        Object.keys(hourlyData).sort().forEach(function(k) {
            var values = hourlyData[k];
            var avg = values.reduce(function(a, b) { return a + b; }, 0) / values.length;
            result.push({ time: new Date(parseInt(k)), value: avg });
        });
        
        var modelStartUTC = modelTimeRange.start.getTime();
        stationObservedData[apiId] = result.filter(function(d) { return d.time.getTime() >= modelStartUTC; });
    } catch (err) {
        console.error(err);
    }
}

async function loadStationData(stationId) {
    if (!modelTimeRange.start || !modelTimeRange.end) return;
    var now = new Date();
    var noaaStart = new Date(now);
    noaaStart.setDate(noaaStart.getDate() - 7);
    noaaStart.setUTCHours(0, 0, 0, 0);
    var url = 'https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?station=' + stationId + 
              '&product=water_level&datum=NAVD&units=metric&time_zone=gmt&format=json&begin_date=' + 
              noaaStart.toISOString().slice(0, 10).replace(/-/g, '') + '&end_date=' + 
              now.toISOString().slice(0, 10).replace(/-/g, '');
    try {
        var response = await fetch(url);
        if (!response.ok) return;
        var data = await response.json();
        if (data.error || !data.data) return;
        var rawData = data.data.map(function(item) {
            return { time: new Date(item.t.replace(' ', 'T') + 'Z'), value: parseFloat(item.v) };
        }).filter(function(item) { return !isNaN(item.value); });
        var modelStartUTC = modelTimeRange.start.getTime();
        stationObservedData[stationId] = rawData.filter(function(d) { return d.time.getTime() >= modelStartUTC; });
    } catch (err) {
        console.error(err);
    }
}

function removeAnomaly(data) {
    if (!data || data.length === 0) return data;
    var sum = 0;
    data.forEach(function(d) { sum += d.value; });
    var avg = sum / data.length;
    return data.map(function(d) { return { time: d.time, value: d.value - avg }; });
}

function renderCompareChart(station) {
    var stationId = station.isIrma ? station.apiId : station.id;
    var observedData = removeAnomaly(stationObservedData[stationId] || []);
    var predData = removeAnomaly(modelData[station.id] || []);
    
    var obsMap = new Map();
    observedData.forEach(function(d) { obsMap.set(d.time.getTime(), d.value); });
    var predMap = new Map();
    predData.forEach(function(d) { predMap.set(d.time.getTime(), d.value); });
    
    var absSum = 0;
    var count = 0;
    predData.forEach(function(d) {
        if (obsMap.has(d.time.getTime())) {
            absSum += Math.abs(d.value - obsMap.get(d.time.getTime()));
            count++;
        }
    });
    var mae = count > 0 ? absSum / count : 0;
    
    var stationDisplayName = station.isIrma ? station.name : getStationName(station.id);
    document.getElementById('stationTitle').textContent = station.name + 
        (station.isIrma && station.apiId ? ' (' + station.apiId + ')' : ' - ' + stationDisplayName) + 
        ' (MAE: ' + mae.toFixed(3) + ')';
    
    var chartStartTime = modelTimeRange.start.getTime();
    var chartEndTime = modelTimeRange.end.getTime();
    
    var obsMap2 = new Map();
    observedData.forEach(function(d) { obsMap2.set(d.time.getTime(), d.value); });
    var predMap2 = new Map();
    predData.forEach(function(d) { predMap2.set(d.time.getTime(), d.value); });
    
    var labels = [];
    var obsDataset = [];
    var predDataset = [];
    for (var t = chartStartTime; t <= chartEndTime; t += 3600000) {
        var date = new Date(t);
        var label = date.getUTCFullYear() + '-' + 
                   String(date.getUTCMonth() + 1).padStart(2, '0') + '-' + 
                   String(date.getUTCDate()).padStart(2, '0') + ' ' + 
                   String(date.getUTCHours()).padStart(2, '0') + ':00';
        labels.push(label);
        obsDataset.push(obsMap2.has(t) ? obsMap2.get(t) : null);
        predDataset.push(predMap2.has(t) ? predMap2.get(t) : null);
    }
    
    if (compareChart && compareChart.destroy) compareChart.destroy();
    var ctx = document.getElementById('compareChart').getContext('2d');
    compareChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: 'Observed', data: obsDataset, borderColor: '#0066cc', backgroundColor: 'rgba(0,102,204,0.1)', fill: false, pointRadius: 1, tension: 0.1, spanGaps: true },
                { label: 'Model Prediction', data: predDataset, borderColor: '#cc0000', backgroundColor: 'rgba(204,0,0,0.05)', fill: false, pointRadius: 1, tension: 0.1, spanGaps: true }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: { legend: { display: true, position: 'top' } },
            scales: {
                x: { title: { display: true, text: 'Date (GMT)' } },
                y: { title: { display: true, text: 'Water Level (meters)' } }
            }
        }
    });
}

initMap();
    </script>
</body>
</html>
